name: release

# Triggered by pushing a `v*` tag (e.g. `v0.1.0`).
# Builds:
#   - Linux PyInstaller tarball (x86_64)
# Uploads as assets on the GitHub release.
#
# macOS users install via the Homebrew formula in this repo
# (`brew install rafael5/vista/vista`), which sources from the
# GitHub auto-generated tag archive — no PyPI involved.
#
# aarch64 will be added once we have a clean cross-build path.
# Deferred to v0.2.x.
#
# Why ubuntu-22.04 + uv (not manylinux2014):
# The manylinux container's CPython is built without `--enable-shared`,
# so PyInstaller can't find libpython.so and refuses to bundle. uv's
# `python install` pulls a python-build-standalone interpreter that
# *does* ship libpython.so. Combined with the ubuntu-22.04 runner
# (glibc 2.35), the resulting binary runs on Ubuntu 22.04+,
# Debian 12+, RHEL 9+, and any Linux from ~2022 onward.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  linux-binary:
    name: linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: .python-version

      - name: Install build deps
        run: uv sync --extra package

      - name: Build the bundle
        run: |
          uv run pyinstaller --clean --noconfirm vista.spec
          tar -cJf vista-linux-x86_64.tar.xz -C dist vista

      - name: Smoke test
        run: ./dist/vista/vista --version

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: vista-linux-x86_64.tar.xz

  release:
    name: publish
    needs: [linux-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: collect for release
        run: |
          mkdir release
          cp artifacts/linux-x86_64/* release/
          (cd release && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  bump-formula:
    # After the release exists, point Formula/vista.rb at the new tag's
    # source archive so `brew upgrade vista` picks it up automatically.
    # Pushes back to main with [skip ci] so this doesn't loop.
    name: bump homebrew formula
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute archive url + sha256
        id: archive
        run: |
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "tag=$TAG"  >> "$GITHUB_OUTPUT"
          echo "url=$URL"  >> "$GITHUB_OUTPUT"
          echo "sha=$SHA"  >> "$GITHUB_OUTPUT"

      - name: Patch Formula/vista.rb
        run: |
          python3 <<'PY'
          import os, pathlib, re
          tag = os.environ["TAG"]
          url = os.environ["URL"]
          sha = os.environ["SHA"]
          p = pathlib.Path("Formula/vista.rb")
          s = p.read_text()
          s = re.sub(
              r'url "https://github\.com/rafael5/vista-cli/archive/refs/tags/v[0-9.]+\.tar\.gz"',
              f'url "{url}"',
              s,
              count=1,
          )
          # The formula's own sha256 is the first one in the file;
          # the `click` resource's sha256 comes after and must not change.
          s = re.sub(
              r'sha256 "[0-9a-f]{64}"',
              f'sha256 "{sha}"',
              s,
              count=1,
          )
          p.write_text(s)
          print(f"Patched Formula/vista.rb → {tag}")
          PY
        env:
          TAG: ${{ steps.archive.outputs.tag }}
          URL: ${{ steps.archive.outputs.url }}
          SHA: ${{ steps.archive.outputs.sha }}

      - name: Commit + push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/vista.rb
          if git diff --cached --quiet; then
            echo "Formula already at $TAG — nothing to commit."
            exit 0
          fi
          git commit -m "Formula/vista.rb: auto-bump to $TAG [skip ci]"
          git push origin main
        env:
          TAG: ${{ steps.archive.outputs.tag }}
