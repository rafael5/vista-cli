name: release

# Triggered by pushing a `v*` tag (e.g. `v0.1.0`).
# Builds:
#   - Linux PyInstaller tarball (x86_64)
# Uploads as assets on the GitHub release.
#
# macOS users install via the Homebrew formula in this repo
# (`brew install rafael5/vista/vista`), which sources from the
# GitHub auto-generated tag archive — no PyPI involved.
#
# aarch64 will be added once we have a clean cross-build path.
# Cross-compiling via the manylinux2014 container + QEMU breaks
# `actions/checkout@v4` (Node 20 doesn't run on the container's
# glibc); the modern fix is a native ARM runner. Deferred until
# v0.2.x.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  linux-binary:
    name: linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: build the bundle inside manylinux2014_x86_64
        # Run the build inside the manylinux container so the
        # resulting binary is glibc 2.17 forward-compat. Mount the
        # working tree at /work; checkout already happened on the
        # runner, which is the supported pattern.
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c '
              set -euxo pipefail
              /opt/python/cp312-cp312/bin/python -m venv .venv
              .venv/bin/pip install -U pip
              .venv/bin/pip install -e ".[package]"
              .venv/bin/pyinstaller --clean --noconfirm vista.spec
              tar -cJf vista-linux-x86_64.tar.xz -C dist vista
            '

      - name: smoke test
        run: ./dist/vista/vista --version

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: vista-linux-x86_64.tar.xz

  release:
    name: publish
    needs: [linux-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: collect for release
        run: |
          mkdir release
          cp artifacts/linux-x86_64/* release/
          (cd release && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
