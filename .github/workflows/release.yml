name: release

# Triggered by pushing a `v*` tag (e.g. `v0.1.0`).
# Builds:
#   - Linux PyInstaller tarballs (x86_64, aarch64)
# Uploads everything as assets on the GitHub release.
#
# macOS users install via the Homebrew formula in this repo
# (`brew install rafael5/vista/vista`), which sources from the
# GitHub auto-generated tag archive — no PyPI involved.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write          # to create / edit the release

jobs:
  # ── Linux PyInstaller tarballs ──────────────────────────────────
  linux-binary:
    name: linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            container: quay.io/pypa/manylinux2014_x86_64
          - arch: aarch64
            # Cross-build for arm64 via QEMU + the manylinux aarch64 image.
            container: quay.io/pypa/manylinux2014_aarch64
    container:
      image: ${{ matrix.container }}
    steps:
      - uses: actions/checkout@v4
      - name: build the bundle
        run: |
          /opt/python/cp312-cp312/bin/python -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -e ".[package]"
          .venv/bin/pyinstaller --clean --noconfirm vista.spec
          tar -cJf vista-linux-${{ matrix.arch }}.tar.xz -C dist vista
      - name: smoke test
        run: ./dist/vista/vista --version
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: vista-linux-${{ matrix.arch }}.tar.xz

  # ── Aggregate artifacts onto the GitHub Release ─────────────────
  release:
    name: publish
    needs: [linux-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: collect for release
        run: |
          mkdir release
          cp artifacts/linux-x86_64/* release/
          cp artifacts/linux-aarch64/* release/
          # SHA-256 manifest covering every release asset
          (cd release && sha256sum * > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
